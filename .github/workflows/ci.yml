# CI pipeline for the Nextgamenight BACKEND repo (chrismcclarin/nextgamenight-backend).
#
# REPO-TOPOLOGY (REVIEW R4 HIGH): the git repo ROOT is this directory
# (periodictabletopbackend_v2/); the Express app lives in the `Sonnet/` SUBDIRECTORY.
# GitHub Actions ONLY reads `.github/workflows/` at the repo ROOT — a workflow placed
# under `Sonnet/.github/workflows/` is INVISIBLE and never runs (a silent false-green
# that would disable the entire D-06 gate, both grep backstops, and the required-status
# branch protection). Therefore this file lives at the repo root, and every app-touching
# step sets `working-directory: Sonnet` with `cache-dependency-path: Sonnet/package-lock.json`.
#
# Two jobs (D-06 / BSEC-02):
#   quality  — fast gate: install + three inverted grep backstops (D-01 / D-05 / BE-043)
#   test     — slow gate (needs: quality): Jest/supertest against a Postgres service container
name: CI

on:
  pull_request:
    branches: [main] # the BE repo's default branch (NOT the docs-root `master`)
  push:
    branches-ignore: [main]

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Sonnet/package-lock.json # lockfile lives in the subdir

      - name: Install dependencies
        working-directory: Sonnet
        run: npm ci

      # ---- D-06 grep backstops --------------------------------------------------
      # grep returns nonzero on NO MATCH (Pitfall 2), so capture with `|| true`, test
      # for non-empty, and `exit 1` on match. Patterns are scoped NARROWLY (Pitfall 3)
      # so they do NOT trip the ~25 legit `where: { user_id: req.params.user_id }`
      # route-param lookups (those derive the actor separately from the verified JWT).

      - name: "Grep gate — client-supplied id as DB authz subject (D-01 backstop / BSEC-01)"
        working-directory: Sonnet
        # Matches `where: { user_id: req.query.user_id }` / `req.body.user_id` — a
        # CLIENT-CONTROLLED id used as the authz FILTER. Deliberately EXCLUDES
        # `req.params.user_id`: that is route-positional (e.g. GET /users/:user_id),
        # used legitimately for lookups across events.js/users.js/userGames.js, and
        # is NOT the spoofable authz-subject class D-01 targets.
        run: |
          HITS=$(grep -rnE 'where:\s*\{\s*user_id:\s*req\.(query|body)\.user_id' routes/ || true)
          if [ -n "$HITS" ]; then
            echo "::error::Client-supplied id (req.query/req.body.user_id) used as a DB authz subject — derive the actor from the verified JWT (req.user.user_id) instead (D-01 / BSEC-01):"
            echo "$HITS"
            exit 1
          fi
          echo "D-01 backstop passed — no client-supplied id used as an authz subject."

      - name: "Grep gate — invite_token leaked via findByPk (BE-043 / BSEC-01)"
        working-directory: Sonnet
        # Matches a findByPk(...) call that explicitly pulls back `invite_token`
        # (the Group invite-token leak). The durable fix is a Group defaultScope
        # excluding invite_token (83-05); this backstop catches a re-leak.
        run: |
          HITS=$(grep -rnE 'findByPk[^)]*invite_token' routes/ || true)
          if [ -n "$HITS" ]; then
            echo "::error::findByPk(...) returning invite_token — the invite token must not be selected into a roster/preview read (BE-043 / BSEC-01):"
            echo "$HITS"
            exit 1
          fi
          echo "BE-043 backstop passed — no findByPk returning invite_token."

      - name: "Grep gate — mass-assignment via ...req.body (D-05 backstop / BSEC-01)"
        working-directory: Sonnet
        # Matches the `...req.body` spread that flows into Sequelize .create()/.update()
        # sinks (mass-assignment). KNOWN PENDING: routes/games.js (POST / create) and
        # routes/groupPromptSettings.js (JSONB schedule merge) still spread ...req.body
        # and are fixed by later plans in THIS phase (D-05C) — until they land, this
        # gate is RED on this branch by design (it IS the backstop catching the holes).
        run: |
          HITS=$(grep -rnE '\.\.\.req\.body' routes/ || true)
          if [ -n "$HITS" ]; then
            echo "::error::...req.body spread into a write sink (mass-assignment) — use an explicit Sequelize fields:[] allow-list / key allow-list instead (D-05 / BSEC-01):"
            echo "$HITS"
            exit 1
          fi
          echo "D-05 backstop passed — no ...req.body mass-assignment spread."

      # ---- 83.1 structural test-hygiene gates (D-01 / D-04 / BTEST-01/02) -------
      # These enforce the de-poisoned green state from Phase 83.1: no test may
      # re-introduce a destructive force-sync or a stray sequelize.close(), and the
      # skip count may only DECREASE (the milestone ratchet to zero). They EXCLUDE
      # the two legitimate harness files (tests/globalSetup.js owns the one-time
      # schema sync({force}) + its parent-process close; tests/globalTeardown.js
      # owns the connection lifecycle close) and FILTER comment lines, so they do
      # not self-flag the harness or their own explanatory prose.

      - name: "Grep gate — destructive force-sync in tests (D-01 / BTEST-01)"
        working-directory: Sonnet
        # Fail if any tests/ file OTHER THAN globalSetup.js contains an uncommented
        # sequelize.sync({force...}) (with or without the space after `{`). globalSetup.js
        # is the ONE legitimate one-time schema build (parent process, guarded) and is
        # excluded — mirroring its close-gate exclusion below.
        run: |
          HITS=$(grep -rnE --include='*.js' 'sync\(\{ ?force' tests/ | grep -v 'tests/globalSetup.js' | grep -vE '^[^:]+:[0-9]+:\s*//' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Destructive sequelize.sync({force}) in a test file (drops every table) — the schema is built ONCE in tests/globalSetup.js; per-test isolation is the global beforeEach TRUNCATE (D-01 / BTEST-01):"
            echo "$HITS"
            exit 1
          fi
          echo "Force-sync gate passed — no destructive force-sync outside globalSetup.js."

      - name: "Grep gate — stray sequelize.close() in tests (D-01 / BTEST-02)"
        working-directory: Sonnet
        # Fail if any tests/ file OTHER THAN the two harness files contains an
        # uncommented sequelize.close(). BOTH globalSetup.js (closes its own
        # parent-process connection after the schema build) and globalTeardown.js
        # (defensively closes any straggler) legitimately close the connection and
        # live under tests/, so they MUST be excluded — otherwise this gate reds the
        # quality job and, because `test` is `needs: quality`, blocks the test job
        # entirely (DoD impossible). Comment lines are filtered explicitly.
        run: |
          HITS=$(grep -rnE 'sequelize\.close' tests/ | grep -vE ':\s*//' | grep -vE 'tests/globalSetup\.js|tests/globalTeardown\.js' || true)
          if [ -n "$HITS" ]; then
            echo "::error::sequelize.close() in a test file kills the shared serial connection for every later test — connection lifecycle is owned solely by tests/globalSetup.js + tests/globalTeardown.js (D-01 / BTEST-02):"
            echo "$HITS"
            exit 1
          fi
          echo "Close gate passed — no stray sequelize.close() outside the harness."

      - name: "Skip-count ratchet — skips may only decrease (D-04)"
        working-directory: Sonnet
        # Count REAL skip tags (the `// SKIP(<plan>)` defer convention), NOT bare
        # `SKIP(` substrings, and fail if the current count EXCEEDS the committed
        # baseline. Skips only go DOWN — each future BE phase un-skips the tests
        # tagged for it; the count MUST hit 0 when v2.0 closes. The baseline lives
        # in tests/.skip-baseline (currently 5: the SKIP(87) lists deferrals owned
        # by Phase 87 Data Integrity).
        run: |
          BASELINE=$(cat tests/.skip-baseline)
          CURRENT=$(grep -rhoE '//\s*SKIP\(' tests/ | wc -l | tr -d ' ')
          echo "Skip ratchet: baseline=$BASELINE current=$CURRENT"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "::error::Skip count rose from $BASELINE (tests/.skip-baseline) to $CURRENT. Skips only go down — un-skip a test or, if a NEW defer is unavoidable, tag it // SKIP(<owning-plan>) AND lower the baseline only when its owner lands. Current SKIP tags:"
            grep -rnE '//\s*SKIP\(' tests/
            exit 1
          fi
          echo "Skip ratchet passed — skip count ($CURRENT) is at or below baseline ($BASELINE)."

  test:
    name: test
    needs: quality # D-06: the Jest suite only runs after the fast grep gate is green
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: boardgame_db
        ports:
          - 5432:5432
        # Health-gate the container so DB steps never race the service coming up.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # BTEST-04 / D-03 part 2: throwaway Redis service for the real-Redis
      # integration ring (npm run test:integration). Mirrors the postgres pin +
      # health-gate above. Pinned to the official redis:7 tag (T-83.1-06 supply-chain
      # mitigation). Reachable only on localhost within the job; destroyed at job end.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DB connection — BOTH forms, so create-database.js (DB_* vars) and the runtime
      # (DATABASE_URL) agree on the same Postgres service container.
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: boardgame_db
      DATABASE_URL: postgres://postgres:password@localhost:5432/boardgame_db
      # Signs availability magic JWTs + RSVP HMAC links (services/magicTokenService,
      # routes/rsvp.js). Throwaway CI-only value — must merely exist for boot.
      MAGIC_TOKEN_SECRET: ci-throwaway-magic-token-secret-1f2e3d4c5b6a
      # BTEST-04 / D-03 part 2: the lazy BullMQ queue connections resolve REDIS_URL
      # to the redis:7 service container above. Only the integration ring actually
      # connects (npm test stays Redis-free via testPathIgnorePatterns).
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Sonnet/package-lock.json

      - name: Install dependencies
        working-directory: Sonnet
        run: npm ci

      # NO migrate step (A5): the earliest migration assumes the "Users" table already
      # exists and cannot run from an empty DB. Schema is built from the models instead:
      # db:create provisions the database, seed runs sequelize.sync({ alter: true }).
      - name: Create database
        working-directory: Sonnet
        run: npm run db:create

      - name: Seed (sync({alter:true}) builds the schema from the models)
        working-directory: Sonnet
        run: npm run seed

      # `npm test` is the unit+DB suite ONLY — Redis is NOT required here (the
      # integration ring is excluded via testPathIgnorePatterns in jest.config.js).
      - name: Jest / supertest suite
        working-directory: Sonnet
        run: npm test

      # BTEST-04 / D-03 part 2: the real-Redis integration ring (enqueue -> real
      # worker -> assert side-effect) runs as a SEPARATE invocation against the
      # redis:7 service. The test job is green only if BOTH this and `npm test` pass.
      - name: Integration ring (real-Redis queues)
        working-directory: Sonnet
        run: npm run test:integration

  # ---- migrate-cli-replay (Phase 87.1 review, F8 / HIGH-2 opt-3) --------------
  # ADDITIVE job (does not alter `quality` or `test`). It exercises the REAL
  # sequelize-cli migration path for the 7 UUID re-key migrations (20260703000001..07),
  # which backend CI otherwise NEVER runs (see the "NO migrate step (A5)" note in the
  # `test` job — the schema is sync()-built, not migrated). Because of the known local
  # cli-migrations gap (URL-only CLI config + a full-chain replay that collides on
  # already-built tables), Railway pre-deploy would otherwise be the FIRST-EVER real
  # sequelize-cli run of these migrations. This job moves that first run into CI:
  #   1. provision a TRUE pre-migration schema (sync from models, then per re-keyed
  #      table drop *_uuid + re-add the legacy Auth0-string column(s), and seed
  #      SequelizeMeta with every migration EXCEPT the 7 new ones);
  #   2. run `npx sequelize-cli db:migrate` — the real CLI config + SequelizeMeta path;
  #   3. verify all 7 re-key files are now recorded in SequelizeMeta.
  migrate-cli-replay:
    name: migrate-cli-replay
    needs: quality # gate behind the fast grep gate (like `test`); independent of `test`
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: boardgame_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The provision script (models) prefers DATABASE_URL; the sequelize-cli config
      # (config/sequelize-cli.config.js) is URL-only and reads the same DATABASE_URL —
      # so both hit the SAME throwaway service DB (closes the known URL-only CLI gap).
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: boardgame_db
      DATABASE_URL: postgres://postgres:password@localhost:5432/boardgame_db
      MAGIC_TOKEN_SECRET: ci-throwaway-magic-token-secret-1f2e3d4c5b6a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Sonnet/package-lock.json

      - name: Install dependencies
        working-directory: Sonnet
        run: npm ci

      - name: Provision TRUE pre-migration schema (F8)
        working-directory: Sonnet
        run: node scripts/ci/provision-premigration-schema.js provision

      - name: Run the real sequelize-cli migration path (npx sequelize-cli db:migrate)
        working-directory: Sonnet
        run: npx sequelize-cli db:migrate

      - name: Verify all 7 re-key migrations booked in SequelizeMeta (F8)
        working-directory: Sonnet
        run: node scripts/ci/provision-premigration-schema.js verify
